<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 390 96" fill="none" role="img" aria-label="APTSA — Airport Time Saving App">
  <defs>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    </style>

    <!--
      Contrail gradient: x1=10 (left edge of A1) → x2=272 (plane tail).
      A1 crossbar ~x=12–38 (0–10%), A2 crossbar ~x=200–228 (72–83%).
      P / T / S region stays dim so the A's flare bright.
    -->
    <linearGradient id="cg1" x1="10" y1="44" x2="272" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="10%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="18%"  stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="58%"  stop-color="#22d3ee" stop-opacity="0.14"/>
      <stop offset="70%"  stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="83%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="92%"  stop-color="#22d3ee" stop-opacity="0.60"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="cg2" x1="10" y1="44" x2="272" y2="44" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="10%"  stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="55%"  stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="75%"  stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.00"/>
    </linearGradient>

    <filter id="glow" x="-5%" y="-400%" width="110%" height="900%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>


  <!-- ══ APTSA — Orbitron Bold, futuristic tech font ══
       font-size=68, baseline y=70 → cap tops ~y=22, crossbars ~y=44.
       letter-spacing=6 spreads letters to ~248px total width.
  -->
  <text x="0" y="70"
        font-family="Orbitron, 'Courier New', monospace"
        font-weight="700"
        font-size="68"
        letter-spacing="6"
        fill="white">APTSA</text>


  <!-- ══ CONTRAIL ══
       Flat straight line at y=44 through all letters.
       Plane tail is at (272, 44) — right where A2's brightness fades.
  -->
  <g filter="url(#glow)">
    <path d="M 10,44 L 272,44"
          stroke="url(#cg1)" stroke-width="4.6"
          fill="none" stroke-linecap="round"/>
    <path d="M 10,45.4 L 272,45.4"
          stroke="url(#cg2)" stroke-width="1.8"
          fill="none" stroke-linecap="round"/>
  </g>


  <!--
    ══ AIRPLANE — single closed path in 100×100 local space ══════
    Tail at (272, 44), nose at ~(345, 11). Plane takes off right
    at the end of the text where the contrail colour fades.

    Transform chain (applied right-to-left by SVG):
      translate(-50,-50)  — centre local origin on plane
      scale(0.9)          — fit within viewBox
      rotate(-25)         — tilt: nose up-right, tail down-left
      translate(309,27)   — final SVG position

    Verified tail  (5,50)  → (272, 44)
    Verified nose (95,50)  → (345, 11)
  -->
  <path transform="translate(309,27) rotate(-25) scale(0.9) translate(-50,-50)"
        fill="#22d3ee" d="
    M 95,50
    C 93,44  85,44  78,44
    L 62,44
    L 38,16
    L 32,22
    L 52,44
    L 22,44
    L 10,34
    L 14,44
    L  6,44
    C  5,46   5,48   5,50
    C  5,52   5,54   6,56
    L 14,56
    L 10,66
    L 22,56
    L 52,56
    L 32,78
    L 38,84
    L 62,56
    L 78,56
    C 85,56  93,56  95,50
    Z
  "/>

</svg>

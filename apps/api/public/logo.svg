<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 96" fill="none" role="img" aria-label="APTSA — Airport Time Saving App">
  <defs>

    <!--
      Contrail gradient: first-A left crossbar (10,44) → plane tail (388,59).
      Both A crossbars light up at full opacity; P T S fade to ~20%.

      Letter x-positions after tightening (4 px gaps):
        A1  peak=24  feet=0,48      crossbar x=10–38   (0–7 % of gradient)
        P   stem=52  bump→102
        T   bar=106–150  stem=128
        S   x=154–198
        A2  peak=222 feet=198,246   crossbar x=208–236  (52–60 % of gradient)
    -->
    <linearGradient id="cg1"
                    x1="10" y1="44" x2="385" y2="59"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="7%"   stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="13%"  stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="49%"  stop-color="#22d3ee" stop-opacity="0.16"/>
      <stop offset="52%"  stop-color="#22d3ee" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="68%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="77%"  stop-color="#22d3ee" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.10"/>
    </linearGradient>

    <linearGradient id="cg2"
                    x1="10" y1="44" x2="385" y2="59"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="7%"   stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="50%"  stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="68%"  stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.00"/>
    </linearGradient>

    <filter id="glow" x="-5%" y="-400%" width="110%" height="900%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

  </defs>


  <!-- ══ LETTERFORMS — tightened to 4 px gaps ══
       A1 : peak 24,  feet  0 / 48
       P  : stem 52,  bump → 102
       T  : bar 106–150, stem 128
       S  : x 154 – 198
       A2 : peak 222, feet 198 / 246
  -->
  <g stroke="#fff" stroke-width="5.5" stroke-linecap="round"
     stroke-linejoin="round" fill="none">

    <!-- A1 -->
    <line x1="24"  y1="8"  x2="0"   y2="68"/>
    <line x1="24"  y1="8"  x2="48"  y2="68"/>

    <!-- P -->
    <line x1="52"  y1="8"  x2="52"  y2="68"/>
    <path d="M 52,8 C 102,8 102,44 52,44"/>

    <!-- T -->
    <line x1="106" y1="8"  x2="150" y2="8"/>
    <line x1="128" y1="8"  x2="128" y2="68"/>

    <!-- S -->
    <path d="M 195,17 C 195,8 154,8 154,29 C 154,44 200,44 200,58 C 200,70 154,70 154,62"/>

    <!-- A2 -->
    <line x1="222" y1="8"  x2="198" y2="68"/>
    <line x1="222" y1="8"  x2="246" y2="68"/>

  </g>


  <!-- ══ CONTRAIL ══
       Stays flat at y=44 through both A crossbars, then curves to
       plane tail at (388, 59).
  -->
  <g filter="url(#glow)">
    <path d="M 10,44 C 140,44 240,44 278,44 C 320,44 362,53 385,59"
          stroke="url(#cg1)" stroke-width="4.6"
          fill="none" stroke-linecap="round"/>
    <path d="M 10,45.4 C 140,45.4 240,45.4 278,45.4 C 320,45.4 362,54.4 385,60.4"
          stroke="url(#cg2)" stroke-width="1.8"
          fill="none" stroke-linecap="round"/>
  </g>


  <!--
    ══ AIRPLANE — single closed path in 100×100 local space ══════
    Drawn clockwise. Nose at right (95,50), tail at left (5,50).
    Wings sweep back. Horizontal stabs at tail.
    No separate pieces — one path, zero overlap issues.

    Transform chain (applied right-to-left by SVG):
      translate(-50,-50)  — centre local origin on plane
      scale(0.9)          — fit within viewBox
      rotate(-25)         — tilt: nose up-right, tail down-left
      translate(422,42)   — final SVG position

    Verified key SVG coords:
      Nose      (95,50) → (451, 24)
      Tail      ( 5,50) → (385, 59)  ← == contrail endpoint
      Wing-top  (38,16) → (393, 18)
      Wing-bot  (38,84) → (420, 74)
      Stab-top  (10,34) → (377, 44)
      Stab-bot  (10,66) → (390, 70)
  -->
  <path transform="translate(422,42) rotate(-25) scale(0.9) translate(-50,-50)"
        fill="#22d3ee" d="
    M 95,50
    C 93,44  85,44  78,44
    L 62,44
    L 38,16
    L 32,22
    L 52,44
    L 22,44
    L 10,34
    L 14,44
    L  6,44
    C  5,46   5,48   5,50
    C  5,52   5,54   6,56
    L 14,56
    L 10,66
    L 22,56
    L 52,56
    L 32,78
    L 38,84
    L 62,56
    L 78,56
    C 85,56  93,56  95,50
    Z
  "/>

</svg>

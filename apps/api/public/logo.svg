<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 76" fill="none" role="img" aria-label="APTSA — Airport Time Saving App">
  <defs>

    <!--
      CONTRAIL GRADIENT — horizontal, x=10 → x=326
      Solid at both A crossbars, recedes to ~22% through P/T/S,
      then fades to near-zero over the 48 px (≈0.5 in) gap before the plane.
    -->
    <linearGradient id="contrail"
                    x1="10" y1="0" x2="326" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"     stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="8.9%"   stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="15.2%"  stop-color="#22d3ee" stop-opacity="0.26"/>
      <stop offset="32.9%"  stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="50.6%"  stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="65.8%"  stop-color="#22d3ee" stop-opacity="0.24"/>
      <stop offset="71.5%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="80.4%"  stop-color="#22d3ee" stop-opacity="1.00"/>
      <stop offset="90%"    stop-color="#22d3ee" stop-opacity="0.32"/>
      <stop offset="100%"   stop-color="#22d3ee" stop-opacity="0.04"/>
    </linearGradient>

    <linearGradient id="contrail2"
                    x1="10" y1="0" x2="326" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"    stop-color="#22d3ee" stop-opacity="0.36"/>
      <stop offset="8.9%"  stop-color="#22d3ee" stop-opacity="0.36"/>
      <stop offset="50%"   stop-color="#22d3ee" stop-opacity="0.08"/>
      <stop offset="80.4%" stop-color="#22d3ee" stop-opacity="0.36"/>
      <stop offset="100%"  stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow: blurred copy composited behind crisp shapes -->
    <filter id="glow" x="-12%" y="-40%" width="124%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.0" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>


  <!-- ═══════════════════════════════════════════════════════════
       LETTERFORMS  —  5.5 px round stroke  ·  cap y=8  ·  base y=68
       A₁ crossbar (t=0.6): x=10–38 y=44  ·  A₂: x=236–264 y=44
       ═══════════════════════════════════════════════════════════ -->

  <g stroke="#fff" stroke-width="5.5" stroke-linecap="round"
     stroke-linejoin="round" fill="none">

    <!-- A₁  no crossbar — contrail is the crossbar -->
    <line x1="24"  y1="8"  x2="0"   y2="68"/>
    <line x1="24"  y1="8"  x2="48"  y2="68"/>

    <!-- P -->
    <line x1="58"  y1="8"  x2="58"  y2="68"/>
    <path d="M 58,8 C 108,8 108,44 58,44"/>

    <!-- T -->
    <line x1="114" y1="8"  x2="162" y2="8"/>
    <line x1="138" y1="8"  x2="138" y2="68"/>

    <!-- S -->
    <path d="M 215,17 C 215,8 170,8 170,29
             C 170,44 218,44 218,58
             C 218,70 170,70 170,62"/>

    <!-- A₂  no crossbar — contrail is the crossbar -->
    <line x1="250" y1="8"  x2="226" y2="68"/>
    <line x1="250" y1="8"  x2="274" y2="68"/>

  </g>


  <!-- ═══════════════════════════════════════════════════════════
       CONTRAIL  —  left side A₁ (x=10) → right side A₂ (x=264) → plane tail (x=326)
       ═══════════════════════════════════════════════════════════ -->

  <g filter="url(#glow)">
    <line x1="10" y1="44"   x2="326" y2="44"
          stroke="url(#contrail)"  stroke-width="4.6" stroke-linecap="round"/>
    <line x1="10" y1="45.4" x2="326" y2="45.4"
          stroke="url(#contrail2)" stroke-width="1.8" stroke-linecap="round"/>
  </g>


  <!-- ═══════════════════════════════════════════════════════════
       AIRPLANE  —  professional narrow-body side profile, facing east
       ───────────────────────────────────────────────────────────
       Construction principle: every edge is a smooth cubic bezier.
       No polygon corners anywhere in the silhouette.

       Reference geometry:
         Fuselage  x=326–407   centre y=44   height 14 px (y=37–51)
         Tail fin  base x=328–344  tip y=23  (swept leading edge)
         H-stabs   root x≈328   tip x≈316   (small, clean sweep)
         Wing      root x=370–374  tip (x=344,y=70)  dominant element
         Engine    capsule at x=348–370  centre y=63   under wing
       ═══════════════════════════════════════════════════════════ -->

  <g fill="#22d3ee" filter="url(#glow)">

    <!--
      ── FUSELAGE ──────────────────────────────────────────────
      Single closed path.  Upper half: nose curve → smooth taper to tail.
      Lower half: mirror.  The tail end comes to a soft blunt point at
      x=326,y=44, exactly where the contrail terminates.
      The nose is a clean elliptical taper; no abrupt shoulders.
    -->
    <path d="
      M 407,44
      C 403,38  393,36  374,36
      L 337,36
      C 331,36  327,40  326,44
      C 327,48  331,52  337,52
      L 374,52
      C 393,52  403,50  407,44
      Z
    "/>

    <!--
      ── VERTICAL TAIL FIN ─────────────────────────────────────
      Swept leading edge (curves forward as it rises), near-vertical
      trailing edge — the hallmark of a modern commercial jet fin.
      Attaches cleanly to the fuselage top at x=329–343, y=36.
    -->
    <path d="
      M 329,36
      C 330,31  334,26  339,22
      C 343,22  347,24  346,27
      C 343,31  340,34  340,36
      Z
    "/>

    <!--
      ── HORIZONTAL STABILISERS ────────────────────────────────
      Two small swept surfaces at the tail.  Each is a clean
      four-point bezier curve — no jagged polygon edges.
    -->
    <!-- Upper stabiliser -->
    <path d="
      M 328,40
      C 324,39  319,38  316,36
      C 318,36  322,38  328,39
      Z
    "/>
    <!-- Lower stabiliser -->
    <path d="
      M 328,48
      C 322,50  318,52  316,52
      C 319,50  324,49  328,47
      Z
    "/>

    <!--
      ── MAIN WING ─────────────────────────────────────────────
      The hero element of the silhouette.  A gracefully swept
      low-mounted wing — both the leading and trailing edges are
      smooth cubic bezier curves, giving a blade-like quality.

      Root attaches at fuselage bottom (y=52) at x=370–374.
      Leading edge sweeps back 30° to tip at (344,70).
      Trailing edge sweeps back ~15°, creating correct taper.
      Both edges are single C-curves — zero straight segments.
    -->
    <path d="
      M 374,52
      C 363,53  351,59  344,70
      L 348,72
      C 355,62  367,56  371,54
      Z
    "/>

    <!--
      ── ENGINE NACELLE ────────────────────────────────────────
      Clean elongated capsule — wider at the inlet (right/east side),
      slightly tapered at the nozzle.  Hung below the wing mid-span.
      Drawn as a single closed bezier path (not a rect) so the inlet
      and nozzle openings read as proper rounded profiles.
    -->
    <path d="
      M 370,59
      C 376,59  377,67  371,67
      L 349,67
      C 343,67  342,59  348,59
      Z
    "/>

  </g>

</svg>

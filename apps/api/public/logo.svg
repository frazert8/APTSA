<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 415 76" fill="none" role="img" aria-label="APTSA — Airport Time Saving App">
  <defs>

    <!--
      CONTRAIL GRADIENT — horizontal, x=10 → x=326
      ─────────────────────────────────────────────
      The contrail IS the crossbar of both A's (100 % opaque at those
      positions).  Through P, T, S it dips to ~25 % so it reads as a
      subtle connecting thread rather than overpowering the letters.
      Past the last A it fades over 48 px (≈ 0.5 in @ 96 dpi) before
      the plane sits at x=326.

      Stop positions (userSpaceOnUse, span = 326−10 = 316 px):
        x=10  →  0.0 %   opacity 1.00  first A crossbar L
        x=38  →  8.9 %   opacity 1.00  first A crossbar R
        x=58  → 15.2 %   opacity 0.28  into P
        x=114 → 32.9 %   opacity 0.20  into T
        x=170 → 50.6 %   opacity 0.20  into S
        x=218 → 65.8 %   opacity 0.25  leaving S
        x=236 → 71.5 %   opacity 1.00  last A crossbar L
        x=264 → 80.4 %   opacity 1.00  last A crossbar R
        x=290 → 88.6 %   opacity 0.38  clearing the logo
        x=326 →100.0 %   opacity 0.05  at plane tail
    -->
    <linearGradient id="contrail"
                    x1="10" y1="0" x2="326" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"     stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="8.9%"   stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="15.2%"  stop-color="#22d3ee" stop-opacity="0.28"/>
      <stop offset="32.9%"  stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="50.6%"  stop-color="#22d3ee" stop-opacity="0.20"/>
      <stop offset="65.8%"  stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="71.5%"  stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="80.4%"  stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="88.6%"  stop-color="#22d3ee" stop-opacity="0.38"/>
      <stop offset="100%"   stop-color="#22d3ee" stop-opacity="0.05"/>
    </linearGradient>

    <!-- Softer secondary contrail (1 px lower, more diffuse) -->
    <linearGradient id="contrail2"
                    x1="10" y1="0" x2="326" y2="0"
                    gradientUnits="userSpaceOnUse">
      <stop offset="0%"    stop-color="#22d3ee" stop-opacity="0.40"/>
      <stop offset="8.9%"  stop-color="#22d3ee" stop-opacity="0.40"/>
      <stop offset="50%"   stop-color="#22d3ee" stop-opacity="0.10"/>
      <stop offset="80.4%" stop-color="#22d3ee" stop-opacity="0.40"/>
      <stop offset="100%"  stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>

    <!-- Glow: composites blurred copy beneath the crisp layer -->
    <filter id="glow" x="-8%" y="-50%" width="116%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>


  <!-- ═══════════════════════════════════════════════════════════
       LETTERFORMS  —  geometric stroke, 5.5 px round cap / join
       Cap y=8  ·  Baseline y=68  ·  Letter width 48 px  ·  Kern 10 px
       A₁ crossbar intersection (t=0.6):  x_L=10  x_R=38  y=44
       A₂ crossbar intersection (t=0.6):  x_L=236  x_R=264  y=44
       ═══════════════════════════════════════════════════════════ -->

  <g stroke="#ffffff" stroke-width="5.5" stroke-linecap="round"
     stroke-linejoin="round" fill="none">

    <!-- A₁  (x 0–48)  — NO crossbar; contrail serves as crossbar -->
    <line x1="24"  y1="8"  x2="0"   y2="68"/>
    <line x1="24"  y1="8"  x2="48"  y2="68"/>

    <!-- P  (x 58–106) -->
    <line x1="58"  y1="8"  x2="58"  y2="68"/>
    <path d="M 58,8 C 108,8 108,44 58,44"/>

    <!-- T  (x 114–162) -->
    <line x1="114" y1="8"  x2="162" y2="8"/>
    <line x1="138" y1="8"  x2="138" y2="68"/>

    <!-- S  (x 170–218) -->
    <path d="M 215,17
             C 215,8  170,8  170,29
             C 170,44 218,44 218,58
             C 218,70 170,70 170,62"/>

    <!-- A₂  (x 226–274)  — NO crossbar; contrail serves as crossbar -->
    <line x1="250" y1="8"  x2="226" y2="68"/>
    <line x1="250" y1="8"  x2="274" y2="68"/>

  </g>


  <!-- ═══════════════════════════════════════════════════════════
       CONTRAIL  —  left side of A₁  →  right side of A₂  →  plane tail
       Horizontal at y=44 (crossbar height).  Single continuous path;
       the gradient controls opacity: solid at both A crossbars,
       whisper-faint through P / T / S, then fades over the 48 px gap.
       ═══════════════════════════════════════════════════════════ -->

  <g filter="url(#glow)">
    <!-- Primary contrail line -->
    <line x1="10" y1="44" x2="326" y2="44"
          stroke="url(#contrail)"  stroke-width="4.8" stroke-linecap="round"/>
    <!-- Secondary, slightly lower, for atmospheric spread -->
    <line x1="10" y1="45.5" x2="326" y2="45.5"
          stroke="url(#contrail2)" stroke-width="2"   stroke-linecap="round"/>
  </g>


  <!-- ═══════════════════════════════════════════════════════════
       AIRPLANE  —  flat commercial-jet silhouette, facing east
       Tail at x=326 (flush with contrail end), nose at x=404
       Fuselage centre at y=44 — aligned with the contrail line
       Wings span y=17 to y=71  (±27 px from centre)
       4 engine nacelles — 747-class quad layout
       ═══════════════════════════════════════════════════════════ -->

  <g fill="#22d3ee" filter="url(#glow)">

    <!--
      FUSELAGE  —  closed path, clockwise from nose tip.
      Upper surface: nose → upper-nose shoulder → 747 hump peak
        → hump back-slope → main fuselage → tail upper taper.
      Lower surface: tail lower taper → lower fuselage → lower nose → nose.
      Hump (upper-deck) sits x=370–395, rises 7 px above main roof.
    -->
    <path d="
      M 404,44
      C 400,38  390,35  378,34
      L 370,31
      C 362,31  354,34  348,35
      L 332,36
      C 328,36  326,40  326,44
      C 326,48  328,52  332,52
      L 348,53
      C 356,54  368,52  380,51
      C 392,50  400,48  404,44
      Z
    "/>

    <!-- VERTICAL TAIL FIN — sweeps up from fuselage at x=326–338 -->
    <path d="M 326,36 L 330,22 L 340,24 L 342,36 Z"/>

    <!-- HORIZONTAL STABILISERS — small swept wings at tail -->
    <path d="M 326,36 L 314,28 L 317,31 L 327,36 Z"/>  <!-- upper -->
    <path d="M 326,52 L 314,60 L 317,57 L 327,52 Z"/>  <!-- lower -->

    <!--
      MAIN WINGS — large, swept back.
      Root attached at ~x=365 on fuselage surface;
      tip sweeps back to x=338, spanning y=17 (upper) and y=71 (lower).
      Four vertices each wing:
        Upper: front-root(365,36) · tip-leading(338,17) · tip-trailing(334,22) · rear-root(358,37)
        Lower: front-root(365,52) · tip-leading(334,66) · tip-trailing(338,71) · rear-root(358,51)
    -->
    <path d="M 365,36 L 338,17 L 334,22 L 358,37 Z"/>  <!-- upper wing -->
    <path d="M 365,52 L 334,66 L 338,71 L 358,51 Z"/>  <!-- lower wing -->

    <!--
      ENGINE NACELLES  —  4 pods (2 per wing), 747-quad layout.
      Positions computed by linear interpolation along wing leading edge.

      Upper wing edge: root(365,36) → tip(338,17), length=28 px x-span.
        Outer pod  cx=343: t=(365-343)/27=0.81 → wing_y=36+0.81×(17-36)=20.6 → cy=25  (+5 pylon)
        Inner pod  cx=353: t=(365-353)/27=0.44 → wing_y=36+0.44×(17-36)=27.6 → cy=32  (+5 pylon)

      Lower wing mirrors about y=44:
        Inner lower cy = 44+(44-32) = 56
        Outer lower cy = 44+(44-25) = 63
    -->
    <ellipse cx="343" cy="25" rx="11" ry="4"/>   <!-- outer upper  -->
    <ellipse cx="353" cy="32" rx="11" ry="4"/>   <!-- inner upper  -->
    <ellipse cx="353" cy="56" rx="11" ry="4"/>   <!-- inner lower  -->
    <ellipse cx="343" cy="63" rx="11" ry="4"/>   <!-- outer lower  -->

  </g>

</svg>

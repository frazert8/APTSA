<svg xmlns="http://www.w3.org/2000/svg" viewBox="-30 0 410 133" fill="none" role="img" aria-label="APTSA — Airport Time Saving App">
  <defs>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@800&display=swap');
    </style>

    <!--
      ═══════════════════════════════════════════════════════════════
      CONTRAIL PATH — smooth 2-segment bezier matching reference
      ═══════════════════════════════════════════════════════════════

        Seg 1  M 12,44 → C -40,55  -10,120  70,122
               CP1(−40,55): initial tangent (−52,11) → 12° below horizontal ✓
               Leftward drift: min-x ≈ −14 at t≈0.34 ✓
               Nadir (70,122) — under "P", 52 px below baseline.

        Seg 2  S 242,45  295,36   (smooth-cubic auto-reflects CP1=(150,124))
               Junction tangent: (80,2) ≈ horizontal ✓ (C¹ guaranteed)
               Long gradual rise — crosses y=70 outside text. ✓
               End tangent: (295−242, 36−45)=(53,−9) → −10° ✓ matches plane

      ═══════════════════════════════════════════════════════════════
      MASK — prevents glow bleed into letter-gaps
      ═══════════════════════════════════════════════════════════════
        Black rect hides contrail+glow in text bounding box.
        Gradient fade (x=230→275) creates smooth emergence on right.
        The leftward swing (x<−2) remains fully visible — near-zero
        gradient opacity (~3%) means it fades in naturally.

      ═══════════════════════════════════════════════════════════════
      PLANE  translate(335,29) rotate(−10) scale(0.9) translate(−50,−50)
             Tail (5,50) local → (295.1, 36.0) ≡ contrail end ✓
             Heading −10° matches contrail end tangent ✓
      ═══════════════════════════════════════════════════════════════
    -->

    <!-- Mask gradient: fade contrail in from x=235 to x=285 -->
    <linearGradient id="maskFade" x1="230" y1="0" x2="275" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="black"/>
      <stop offset="100%" stop-color="white"/>
    </linearGradient>

    <!-- Mask: hide contrail glow within text bounding box -->
    <mask id="noTextGlow">
      <rect x="-30" y="0" width="470" height="133" fill="white"/>
      <!-- Solid hide: x=−2→235, y=6→85 (text body + glow margin) -->
      <rect x="-2" y="6" width="232" height="79" fill="black"/>
      <!-- Gradient fade-in: x=230→275 -->
      <rect x="230" y="6" width="45"  height="79" fill="url(#maskFade)"/>
    </mask>

    <!-- Core bright spine -->
    <linearGradient id="cg1" x1="-15" y1="0" x2="295" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.00"/>
      <stop offset="5%"   stop-color="#22d3ee" stop-opacity="0.06"/>
      <stop offset="10%"  stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="40%"  stop-color="#22d3ee" stop-opacity="0.60"/>
      <stop offset="72%"  stop-color="#22d3ee" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="1.00"/>
    </linearGradient>

    <!-- Soft luminous halo -->
    <linearGradient id="cg2" x1="-15" y1="0" x2="295" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.00"/>
      <stop offset="10%"  stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="50%"  stop-color="#22d3ee" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.36"/>
    </linearGradient>

    <!-- Ultra-diffuse outer bloom -->
    <linearGradient id="cg3" x1="-15" y1="0" x2="295" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.00"/>
      <stop offset="40%"  stop-color="#22d3ee" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.09"/>
    </linearGradient>

    <!-- Filter bb: x≈−14–330 (w≈344), y≈36–122 (h≈86). margin=15px.
         x:15/344=4.4% → −5%/110%   y:15/86=17.4% → −18%/136% -->
    <filter id="glow" x="-5%" y="-18%" width="110%" height="136%">
      <feGaussianBlur stdDeviation="1.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>


  <!--
    CONTRAIL — behind text, masked out of letter-gap zones.
    Smooth C¹ S-curve: leftward departure → wide arc under text → long rise to plane.
  -->
  <g filter="url(#glow)" mask="url(#noTextGlow)">
    <path d="M 12,44 C -40,55 -10,120 70,122 S 242,45 295,36"
          stroke="url(#cg3)" stroke-width="20"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 12,44 C -40,55 -10,120 70,122 S 242,45 295,36"
          stroke="url(#cg2)" stroke-width="10"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 12,44 C -40,55 -10,120 70,122 S 242,45 295,36"
          stroke="url(#cg1)" stroke-width="2.4"
          fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>


  <!-- APTSA — above contrail; white letters cover origin overlap. -->
  <text x="0" y="70"
        font-family="'Exo 2', 'Arial', sans-serif"
        font-weight="800"
        font-size="68"
        letter-spacing="6"
        fill="white">APTSA</text>


  <!-- AIRPLANE — ascending −10°. Tail (295.1, 36.0) ≡ contrail end. -->
  <path transform="translate(335,29) rotate(-10) scale(0.9) translate(-50,-50)"
        fill="#22d3ee" d="
    M 95,50
    C 93,44  85,44  78,44
    L 62,44
    L 38,16
    L 32,22
    L 52,44
    L 22,44
    L 10,34
    L 14,44
    L  6,44
    C  5,46   5,48   5,50
    C  5,52   5,54   6,56
    L 14,56
    L 10,66
    L 22,56
    L 52,56
    L 32,78
    L 38,84
    L 62,56
    L 78,56
    C 85,56  93,56  95,50
    Z
  "/>

</svg>
